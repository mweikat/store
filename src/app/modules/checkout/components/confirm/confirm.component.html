<div class="checkout-success container py-5 text-center">
    <div class="card shadow-sm p-4">
      <div class="card-body">
        <div class="mb-4">
          <i class="bi bi-check2-circle" style="font-size: 2rem; color: green;"></i>
        </div>
        <h1 class="text-primary-c1 title">¡Gracias por tu compra!</h1>
        <p class="text-secondary mt-3">
          Tu pedido ha sido procesado con éxito. Te hemos enviado un correo de confirmación con los detalles de tu compra.
        </p>

        <p class="text-secondary mt-3">
          Podras revisar el estado de tus compras en tu perfil.
        </p>
        
        <!-- Resumen del Pedido -->
        <div class="order-summary my-4">
          <h5 class="text-dark mb-3">El número de tu orden es: <b>{{orderNum}}</b></h5>
          <ul class="list-group">
            <li class="list-group-item d-flex justify-content-center">
              {{message}}
            </li>
          </ul>
        </div>
  
        <!-- Botones de acción -->
        <div class="mt-4">
          <a 
            routerLink="/" 
            class="btn btn-primary-c1 me-2"
          >
            Seguir comprando
          </a>
          <a 
            routerLink="/admin/orders" 
            class="btn btn-outline-secondary"
          >
            Ver mis pedidos
          </a>
        </div>
      </div>
    </div>
  </div>
