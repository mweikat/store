<div class="payment-section mt-4">
  <div class="alert alert-danger" *ngIf="errorPayment"> <small>¡Ups!... Existe un problema con el medio de pago seleccionado, favor seleccione otro medio de pago.</small></div>
  <div class="accordion" id="accordionExample">
    @for(payment of payments(); track payment.id; let i = $index) {
      <div class="accordion-item">
        <h2 class="accordion-header" id="headingOne_{{payment.id}}">
          <button
            class="accordion-button"
            type="button"
            [class.collapsed]="selectedAccordionId !== payment.id"
            [attr.aria-expanded]="selectedAccordionId === payment.id"
            (click)="selectPaymentMethod(payment)">
            <div class="form-check d-flex align-items-center">
              <input
                class="form-check-input"
                type="radio"
                name="paymentMethod"
                id="flexRadioDefault1_{{payment.id}}"
                [checked]="selectedAccordionId === payment.id">
              
              <div class="ms-4" *ngIf="payment.logo!=null; else whitoutLogo" [innerHTML]="payment.logo | htmlSanitize:'html'"></div>
              <ng-template #whitoutLogo>
                <label class="form-check-label" for="flexRadioDefault1_{{payment.id}}">
                &nbsp;&nbsp;{{ payment.name }}
              </label>
              </ng-template>
            </div>
          </button>
        </h2>
        <div
          id="collapse_{{payment.id}}"
          class="accordion-collapse collapse"
          [class.show]="selectedAccordionId === payment.id"
          [attr.aria-labelledby]="'headingOne_'+payment.id"
          data-bs-parent="#accordionExample">
          <div class="accordion-body" [innerHTML]="payment.desc | htmlSanitize:'html'"></div>
        </div>
      </div>
    }
  </div>
</div>
